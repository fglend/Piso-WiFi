services:
  piso_wifi:
    build: .
    container_name: piso_wifi
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      FLASK_ENV: development
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      MANAGE_HARDWARE: "false"
      COINSLOT_ENABLED: "true"
      DB_PATH: config/piso_wifi.db
      SECRET_KEY: local-dev-secret-key
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      DEV_FAKE_MAC: AA:BB:CC:DD:EE:FF
      WIFI_INTERFACE: eth0
    networks:
      - piso_net

networks:
  piso_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/24
